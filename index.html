<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Boulder Logger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --chalk: #f5f0eb; --rock: #1a1814; --granite: #2d2926;
    --orange: #e8702a; --yellow: #f5c842; --blue: #3a7bd5;
    --red: #d53a3a; --green: #3ab87a; --purple: #8b3ad5;
    --white: #fff; --glass: rgba(255,255,255,0.06); --border: rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--rock); color: var(--chalk); min-height: 100vh; min-height: -webkit-fill-available; overflow: hidden; position: fixed; width: 100%; height: 100%; }
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s; }
  .screen.hidden { transform: translateX(100%); opacity: 0; pointer-events: none; }
  .screen.slide-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
  #home { background: linear-gradient(160deg, #1a1814 0%, #2d2420 50%, #1a1814 100%); }
  .home-header { padding: 60px 28px 24px; background: linear-gradient(180deg, rgba(232,112,42,0.15) 0%, transparent 100%); border-bottom: 1px solid var(--border); }
  .app-logo { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 4px; color: var(--white); line-height: 1; }
  .app-logo span { color: var(--orange); }
  .app-sub { font-size: 13px; color: rgba(245,240,235,0.5); letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
  .routes-list { flex: 1; overflow-y: auto; padding: 20px 20px 100px; -webkit-overflow-scrolling: touch; }
  .routes-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; text-align: center; gap: 16px; padding: 60px 40px; opacity: 0.5; }
  .routes-empty .icon { font-size: 64px; }
  .routes-empty p { font-size: 15px; line-height: 1.6; }
  .route-card { background: var(--granite); border: 1px solid var(--border); border-radius: 16px; padding: 16px 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: transform 0.15s; position: relative; overflow: hidden; }
  .route-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px 0 0 4px; }
  .route-card:active { transform: scale(0.98); }
  .route-card-info { flex: 1; min-width: 0; }
  .route-card-name { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .route-card-meta { font-size: 12px; color: rgba(245,240,235,0.5); margin-top: 2px; }
  .route-card-holds { font-size: 11px; color: rgba(245,240,235,0.4); margin-top: 4px; }
  .route-card-grade { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; min-width: 40px; text-align: center; }
  .route-card-arrow { color: rgba(245,240,235,0.3); font-size: 18px; }
  .fab { position: fixed; bottom: 28px; right: 24px; width: 62px; height: 62px; background: var(--orange); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 4px 24px rgba(232,112,42,0.5); cursor: pointer; border: none; color: white; z-index: 100; }
  .fab:active { transform: scale(0.93); }
  #editor { background: var(--rock); display: flex; flex-direction: column; }
  .editor-topbar { display: flex; align-items: center; gap: 12px; padding: 54px 16px 14px; background: var(--granite); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .btn-back { background: var(--glass); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--chalk); font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-back:active { opacity: 0.7; }
  .editor-title-input { flex: 1; background: transparent; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--white); outline: none; min-width: 0; }
  .editor-title-input::placeholder { color: rgba(255,255,255,0.3); }
  .btn-save { background: var(--orange); border: none; border-radius: 10px; padding: 8px 16px; color: white; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .wall-area { flex: 1; position: relative; overflow: hidden; background: #111; touch-action: none; }
  .wall-placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: rgba(255,255,255,0.2); background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(255,255,255,0.02) 20px, rgba(255,255,255,0.02) 21px); }
  .wall-placeholder p { font-size: 14px; text-align: center; max-width: 200px; line-height: 1.5; }
  #wall-img { width: 100%; height: 100%; object-fit: contain; display: none; position: absolute; inset: 0; }
  #canvas-overlay { position: absolute; inset: 0; cursor: crosshair; }
  .upload-btn-wall { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(232,112,42,0.9); border: none; border-radius: 14px; padding: 14px 24px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; box-shadow: 0 4px 20px rgba(232,112,42,0.4); z-index: 10; }
  .upload-btn-wall.has-image { top: auto; bottom: 70px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); font-size: 13px; padding: 10px 18px; }
  .editor-bottom { background: var(--granite); border-top: 1px solid var(--border); padding: 12px 16px 32px; flex-shrink: 0; }
  .holds-config { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .config-label { font-size: 12px; color: rgba(245,240,235,0.5); text-transform: uppercase; letter-spacing: 1px; width: 100%; }
  .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.15s; flex-shrink: 0; }
  .color-btn.active { border-color: white; transform: scale(1.2); }
  .grade-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .grade-label { font-size: 12px; color: rgba(245,240,235,0.5); }
  .grade-select { background: var(--glass); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; color: var(--chalk); font-size: 14px; font-family: 'DM Sans', sans-serif; -webkit-appearance: none; outline: none; }
  .btn-undo { margin-left: auto; background: var(--glass); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--chalk); font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  #detail { background: var(--rock); }
  .detail-topbar { display: flex; align-items: center; gap: 12px; padding: 54px 16px 14px; background: var(--granite); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .detail-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; flex: 1; }
  .detail-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .detail-wall { width: 100%; position: relative; background: #111; max-height: 60vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .detail-wall img { width: 100%; max-height: 60vh; object-fit: contain; display: block; }
  .detail-wall canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .detail-wall-placeholder { height: 200px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.2); font-size: 40px; }
  .detail-info { padding: 20px 20px 40px; }
  .detail-grade-badge { display: inline-block; font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; padding: 4px 20px; border-radius: 12px; margin-bottom: 16px; }
  .detail-stats { display: flex; gap: 20px; margin-bottom: 20px; }
  .detail-stat { background: var(--granite); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; flex: 1; text-align: center; }
  .detail-stat-val { font-size: 22px; font-weight: 600; }
  .detail-stat-label { font-size: 11px; color: rgba(245,240,235,0.4); margin-top: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .detail-notes { background: var(--granite); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-top: 16px; }
  .detail-notes-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: rgba(245,240,235,0.4); margin-bottom: 8px; }
  .detail-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-edit { flex: 1; background: var(--orange); border: none; border-radius: 12px; padding: 14px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .btn-delete { background: rgba(213,58,58,0.2); border: 1px solid rgba(213,58,58,0.4); border-radius: 12px; padding: 14px 18px; color: var(--red); font-size: 15px; cursor: pointer; font-family: 'DM Sans', sans-serif; }
  .notes-input { width: 100%; background: transparent; border: none; color: var(--chalk); font-family: 'DM Sans', sans-serif; font-size: 14px; resize: none; outline: none; line-height: 1.6; min-height: 60px; }
  .notes-input::placeholder { color: rgba(245,240,235,0.3); }
</style>
</head>
<body>
<div class="screen" id="home">
  <div class="home-header">
    <div class="app-logo">BOULDER<span>LOG</span></div>
    <div class="app-sub">Mes voies d'escalade</div>
  </div>
  <div class="routes-list" id="routes-list">
    <div class="routes-empty" id="routes-empty">
      <div class="icon">🧗</div>
      <p>Aucune voie enregistrée.<br>Appuie sur <strong>+</strong> pour créer ta première voie !</p>
    </div>
  </div>
  <button class="fab" id="fab-new">+</button>
</div>
<div class="screen hidden" id="editor">
  <div class="editor-topbar">
    <button class="btn-back" id="btn-back-editor">← Retour</button>
    <input class="editor-title-input" id="route-name-input" placeholder="NOM DE LA VOIE" maxlength="30">
    <button class="btn-save" id="btn-save">Sauver</button>
  </div>
  <div class="wall-area" id="wall-area">
    <div class="wall-placeholder" id="wall-placeholder">
      <div style="font-size:48px">🪨</div>
      <p>Ajoute une photo de ton mur puis tape sur les prises</p>
    </div>
    <img id="wall-img" alt="Mur">
    <canvas id="canvas-overlay"></canvas>
    <button class="upload-btn-wall" id="upload-btn">📷 Ajouter une photo</button>
    <input type="file" id="file-input" accept="image/*" style="display:none">
  </div>
  <div class="editor-bottom">
    <div class="holds-config">
      <div class="config-label">Couleur des prises</div>
      <div class="color-btn active" data-color="#f5c842" style="background:#f5c842"></div>
      <div class="color-btn" data-color="#e8702a" style="background:#e8702a"></div>
      <div class="color-btn" data-color="#3ab87a" style="background:#3ab87a"></div>
      <div class="color-btn" data-color="#3a7bd5" style="background:#3a7bd5"></div>
      <div class="color-btn" data-color="#d53a3a" style="background:#d53a3a"></div>
      <div class="color-btn" data-color="#8b3ad5" style="background:#8b3ad5"></div>
      <div class="color-btn" data-color="#ffffff" style="background:#fff"></div>
      <button class="btn-undo" id="btn-undo">↩ Annuler</button>
    </div>
    <div class="grade-row">
      <span class="grade-label">Cotation :</span>
      <select class="grade-select" id="grade-select">
        <option value="?">Inconnue</option>
        <option value="3">3</option><option value="4">4</option><option value="4+">4+</option>
        <option value="5a">5a</option><option value="5b">5b</option><option value="5c">5c</option>
        <option value="6a">6a</option><option value="6a+">6a+</option><option value="6b">6b</option>
        <option value="6b+">6b+</option><option value="6c">6c</option><option value="6c+">6c+</option>
        <option value="7a">7a</option><option value="7a+">7a+</option><option value="7b">7b</option>
        <option value="7b+">7b+</option><option value="7c">7c</option><option value="7c+">7c+</option>
        <option value="8a">8a</option><option value="8b">8b</option><option value="8c">8c</option>
        <option value="9a">9a</option>
      </select>
      <span class="grade-label" style="margin-left:8px">Notes :</span>
      <textarea class="notes-input" id="notes-input" placeholder="Crux, beta…" rows="1" style="flex:1;margin-left:4px;border-radius:8px;padding:6px 10px;background:var(--glass);border:1px solid var(--border);"></textarea>
    </div>
  </div>
</div>
<div class="screen hidden" id="detail">
  <div class="detail-topbar">
    <button class="btn-back" id="btn-back-detail">← Retour</button>
    <div class="detail-title" id="detail-title">VOIE</div>
  </div>
  <div class="detail-content">
    <div class="detail-wall" id="detail-wall"></div>
    <div class="detail-info">
      <div class="detail-grade-badge" id="detail-grade-badge">6a</div>
      <div class="detail-stats">
        <div class="detail-stat"><div class="detail-stat-val" id="detail-holds-count">0</div><div class="detail-stat-label">Prises</div></div>
        <div class="detail-stat"><div class="detail-stat-val" id="detail-date">-</div><div class="detail-stat-label">Date</div></div>
      </div>
      <div class="detail-notes" id="detail-notes-box" style="display:none">
        <div class="detail-notes-title">Notes & Beta</div>
        <div id="detail-notes-text" style="font-size:14px;line-height:1.6;"></div>
      </div>
      <div class="detail-actions">
        <button class="btn-edit" id="btn-edit-route">✏️ Modifier</button>
        <button class="btn-delete" id="btn-delete-route">🗑</button>
      </div>
    </div>
  </div>
</div>
<script>
let routes=JSON.parse(localStorage.getItem('boulderlog_routes')||'[]');
let currentRoute=null,editingId=null,holds=[],currentColor='#f5c842',wallImageDataURL=null,activeScreen='home';
function saveRoutes(){localStorage.setItem('boulderlog_routes',JSON.stringify(routes));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function gradeColor(g){if(!g||g==='?')return'#888';const n=parseFloat(g);if(n<=5)return'#3ab87a';if(n<=6)return'#f5c842';if(n<=7)return'#e8702a';return'#d53a3a';}
function fmtDate(ts){if(!ts)return'-';return new Date(ts).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});}
function showScreen(id,dir='right'){
  ['home','editor','detail'].forEach(sid=>{
    const el=document.getElementById(sid);
    if(sid===id){el.classList.remove('hidden','slide-left');}
    else if(sid===activeScreen){el.classList.add(dir==='right'?'slide-left':'hidden');}
    else{el.classList.add('hidden');el.classList.remove('slide-left');}
  });
  activeScreen=id;
}
function renderRoutes(){
  const list=document.getElementById('routes-list'),empty=document.getElementById('routes-empty');
  list.querySelectorAll('.route-card').forEach(e=>e.remove());
  if(routes.length===0){empty.style.display='';return;}
  empty.style.display='none';
  [...routes].reverse().forEach(r=>{
    const card=document.createElement('div');
    card.className='route-card';
    const color=gradeColor(r.grade);
    card.style.borderColor=color+'44';
    card.innerHTML=`<style>.route-card[data-id="${r.id}"]::before{background:${color};}</style><div class="route-card-info"><div class="route-card-name">${r.name||'Sans nom'}</div><div class="route-card-meta">${fmtDate(r.createdAt)}</div><div class="route-card-holds">${r.holds.length} prise${r.holds.length>1?'s':''}</div></div><div class="route-card-grade" style="color:${color}">${r.grade||'?'}</div><div class="route-card-arrow">›</div>`;
    card.setAttribute('data-id',r.id);
    card.addEventListener('click',()=>openDetail(r.id));
    list.appendChild(card);
  });
}
function drawHolds(cvs,holdsArr){
  const ctx=cvs.getContext('2d');
  ctx.clearRect(0,0,cvs.width,cvs.height);
  holdsArr.forEach((h,i)=>{
    const x=h.x*cvs.width,y=h.y*cvs.height,r=h.radius*Math.min(cvs.width,cvs.height);
    ctx.save();ctx.shadowColor=h.color;ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=h.color+'aa';ctx.fill();
    ctx.lineWidth=3;ctx.strokeStyle=h.color;ctx.stroke();
    ctx.shadowBlur=0;ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.max(10,r*0.9)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(i+1,x,y);ctx.restore();
  });
}
function openDetail(id){
  const route=routes.find(r=>r.id===id);if(!route)return;
  currentRoute=route;
  document.getElementById('detail-title').textContent=route.name||'SANS NOM';
  const gc=gradeColor(route.grade),badge=document.getElementById('detail-grade-badge');
  badge.textContent=route.grade||'?';badge.style.background=gc+'33';badge.style.color=gc;
  document.getElementById('detail-holds-count').textContent=route.holds.length;
  document.getElementById('detail-date').textContent=fmtDate(route.createdAt);
  const nb=document.getElementById('detail-notes-box');
  if(route.notes){nb.style.display='';document.getElementById('detail-notes-text').textContent=route.notes;}
  else nb.style.display='none';
  const wd=document.getElementById('detail-wall');wd.innerHTML='';
  if(route.image){
    const img=document.createElement('img');img.src=route.image;
    img.style.cssText='width:100%;max-height:60vh;object-fit:contain;display:block;';
    wd.appendChild(img);
    img.onload=()=>{
      const c=document.createElement('canvas');
      c.style.cssText='position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
      c.width=img.naturalWidth;c.height=img.naturalHeight;
      wd.appendChild(c);drawHolds(c,route.holds);
    };
  } else {
    wd.innerHTML='<div class="detail-wall-placeholder">🪨</div>';
  }
  showScreen('detail');
}
function openEditor(id=null){
  editingId=id;holds=[];wallImageDataURL=null;
  if(id){
    const r=routes.find(x=>x.id===id);
    if(r){holds=[...r.holds];wallImageDataURL=r.image||null;
      document.getElementById('route-name-input').value=r.name||'';
      document.getElementById('grade-select').value=r.grade||'?';
      document.getElementById('notes-input').value=r.notes||'';}
  } else {
    document.getElementById('route-name-input').value='';
    document.getElementById('grade-select').value='?';
    document.getElementById('notes-input').value='';
  }
  const wi=document.getElementById('wall-img'),ph=document.getElementById('wall-placeholder'),ub=document.getElementById('upload-btn');
  if(wallImageDataURL){wi.src=wallImageDataURL;wi.style.display='block';ph.style.display='none';ub.classList.add('has-image');ub.textContent='📷 Changer';}
  else{wi.style.display='none';ph.style.display='';ub.classList.remove('has-image');ub.innerHTML='📷 Ajouter une photo';}
  setupCanvas();showScreen('editor');
}
function setupCanvas(){
  const wa=document.getElementById('wall-area'),cvs=document.getElementById('canvas-overlay');
  function resize(){cvs.width=wa.offsetWidth;cvs.height=wa.offsetHeight;drawHolds(cvs,holds);}
  resize();
  let touching=false;
  cvs.addEventListener('touchend',e=>{
    e.preventDefault();touching=true;
    if(e.changedTouches.length===1){
      const rect=cvs.getBoundingClientRect(),t=e.changedTouches[0];
      holds.push({x:(t.clientX-rect.left)/rect.width,y:(t.clientY-rect.top)/rect.height,color:currentColor,radius:0.05});
      drawHolds(cvs,holds);
    }
    setTimeout(()=>{touching=false;},400);
  },{passive:false});
  cvs.addEventListener('click',e=>{
    if(touching)return;
    const rect=cvs.getBoundingClientRect();
    holds.push({x:(e.clientX-rect.left)/rect.width,y:(e.clientY-rect.top)/rect.height,color:currentColor,radius:0.05});
    drawHolds(cvs,holds);
  });
  window._resize=resize;
}
document.querySelectorAll('.color-btn').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('.color-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');currentColor=b.dataset.color;
}));
document.getElementById('btn-undo').addEventListener('click',()=>{
  holds.pop();drawHolds(document.getElementById('canvas-overlay'),holds);
});
document.getElementById('upload-btn').addEventListener('click',()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change',e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    wallImageDataURL=ev.target.result;
    const wi=document.getElementById('wall-img');wi.src=wallImageDataURL;wi.style.display='block';
    document.getElementById('wall-placeholder').style.display='none';
    const ub=document.getElementById('upload-btn');ub.classList.add('has-image');ub.textContent='📷 Changer';
    if(window._resize)window._resize();
  };
  reader.readAsDataURL(file);e.target.value='';
});
document.getElementById('btn-save').addEventListener('click',()=>{
  const name=document.getElementById('route-name-input').value.trim()||'Sans nom';
  const grade=document.getElementById('grade-select').value;
  const notes=document.getElementById('notes-input').value.trim();
  const route={id:editingId||uid(),name,grade,notes,holds:[...holds],image:wallImageDataURL,
    createdAt:editingId?(routes.find(r=>r.id===editingId)?.createdAt||Date.now()):Date.now(),updatedAt:Date.now()};
  if(editingId){const idx=routes.findIndex(r=>r.id===editingId);if(idx>=0)routes[idx]=route;}
  else routes.push(route);
  saveRoutes();renderRoutes();showScreen('home','left');
});
document.getElementById('btn-back-editor').addEventListener('click',()=>showScreen('home','left'));
document.getElementById('btn-back-detail').addEventListener('click',()=>showScreen('home','left'));
document.getElementById('btn-edit-route').addEventListener('click',()=>{if(currentRoute)openEditor(currentRoute.id);});
document.getElementById('btn-delete-route').addEventListener('click',()=>{
  if(!currentRoute)return;
  if(!confirm(`Supprimer "${currentRoute.name}" ?`))return;
  routes=routes.filter(r=>r.id!==currentRoute.id);saveRoutes();renderRoutes();showScreen('home','left');
});
document.getElementById('fab-new').addEventListener('click',()=>openEditor());
renderRoutes();
</script>
</body>
</html>
